<!doctype html>
<html lang="en" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17212B">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex,nofollow">
    <title>Share link unavailable</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-blue:          #2AABEE;
            --tg-blue-strong:   #229ED9;
            --tg-bg:            #17212B;
            --tg-panel:         #242F3D;
            --tg-border:        #303D4F;
            --tg-text:          #F5F5F5;
            --tg-textSecondary: #8B9BAA;
            --tg-red:           #E53935;
            --tg-orange:        #FF9800;
            --tg-green:         #4FAE4E;
        }
        @media (prefers-color-scheme: light) {
            :root:not(.theme-dark) {
                --tg-blue:          #0E78C2;
                --tg-blue-strong:   #0A5E96;
                --tg-bg:            #FFFFFF;
                --tg-panel:         #F0F4F7;
                --tg-border:        #D1D5DB;
                --tg-text:          #1F2937;
                --tg-textSecondary: #4B5563;
                --tg-red:           #B91C1C;
                --tg-orange:        #B8860B;
                --tg-green:         #008A6E;
            }
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; }
        body {
            font-family: 'IBM Plex Sans', 'IBM Plex Sans Thai', 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }
        /* Soft radial brand glow — same flavour as login.html */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at top, rgba(42, 171, 238, 0.12), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .card {
            background: var(--tg-panel);
            border: 1px solid var(--tg-border);
            border-radius: 16px;
            padding: 32px 28px 28px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.32);
            position: relative;
            z-index: 1;
        }
        .icon-disc {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 36px;
            color: #FFFFFF;
        }
        .icon-disc.expired      { background: linear-gradient(135deg, #FF845E, #FF516A); }
        .icon-disc.revoked      { background: linear-gradient(135deg, #E53935, #B91C1C); }
        .icon-disc.bad_sig      { background: linear-gradient(135deg, #6E41E2, #4B2DAA); }
        .icon-disc.not_found    { background: linear-gradient(135deg, #5BCAAF, #3BA99C); }
        .icon-disc.file_missing { background: linear-gradient(135deg, #FFD95A, #F5A623); }
        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px;
            line-height: 1.3;
        }
        p {
            color: var(--tg-textSecondary);
            font-size: 14px;
            line-height: 1.55;
            margin: 0 0 12px;
        }
        .code {
            display: inline-block;
            margin-top: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--tg-textSecondary);
            font-size: 11px;
            font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
            letter-spacing: 0.4px;
        }
        @media (prefers-color-scheme: light) {
            :root:not(.theme-dark) .code { background: rgba(0, 0, 0, 0.05); }
        }
        .brand {
            margin-top: 22px;
            font-size: 12px;
            color: var(--tg-textSecondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .brand i { color: var(--tg-blue); }
        @media (max-width: 380px) {
            .card { padding: 24px 20px 20px; }
            .icon-disc { width: 60px; height: 60px; font-size: 30px; }
            h1 { font-size: 19px; }
        }
    </style>
</head>
<body>
    <main class="card" role="alert" aria-live="polite">
        <div id="icon" class="icon-disc bad_sig"><i class="ri-link-unlink-m"></i></div>
        <h1 id="title">Share link unavailable</h1>
        <p id="body">This link can't be opened right now.</p>
        <span id="code" class="code" aria-hidden="true"></span>
        <div class="brand">
            <i class="ri-cloud-line"></i>
            <span>Telegram Media Downloader</span>
        </div>
    </main>
    <script>
        // The server passes the failure code via a literal token at render
        // time (see server.js share-serve handler) — we read it from the
        // page's `?reason=` query param so the same static file can render
        // every code without a templating engine.
        (function () {
            const COPY = {
                expired: {
                    icon: 'ri-time-line',
                    cls: 'expired',
                    title: 'Link expired',
                    body: 'This share link has reached its expiry date. Ask whoever sent it to share a fresh one.',
                },
                revoked: {
                    icon: 'ri-shield-cross-line',
                    cls: 'revoked',
                    title: 'Link revoked',
                    body: 'The owner has revoked access to this link. They can re-issue a new one if needed.',
                },
                bad_sig: {
                    icon: 'ri-link-unlink-m',
                    cls: 'bad_sig',
                    title: 'Invalid link',
                    body: 'This URL doesn’t look right. It may have been copied incorrectly, truncated, or tampered with.',
                },
                not_found: {
                    icon: 'ri-search-line',
                    cls: 'not_found',
                    title: 'Link not found',
                    body: 'No share link with that id exists. The link may have been deleted, or the URL is wrong.',
                },
                file_missing: {
                    icon: 'ri-file-damage-line',
                    cls: 'file_missing',
                    title: 'File no longer available',
                    body: 'The link is valid but the file behind it has been deleted from the server.',
                },
            };
            // Match prefers-color-scheme on first paint.
            try {
                if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                    document.documentElement.classList.remove('theme-dark');
                }
            } catch {}
            const params = new URLSearchParams(location.search);
            const reason = String(params.get('reason') || 'bad_sig');
            const data = COPY[reason] || COPY.bad_sig;
            const iconEl = document.getElementById('icon');
            iconEl.className = 'icon-disc ' + data.cls;
            iconEl.innerHTML = '<i class="' + data.icon + '"></i>';
            document.getElementById('title').textContent = data.title;
            document.getElementById('body').textContent = data.body;
            document.getElementById('code').textContent = reason;
            // Friendly tab title.
            document.title = data.title;
        })();
    </script>
</body>
</html>
