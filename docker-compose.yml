# Compose file for Telegram Media Downloader.
#
# Defaults to the in-process web dashboard (which can also start the realtime
# monitor from the Engine card in Settings). To run a separate headless
# monitor, copy this service block and set TGDL_RUN=monitor; both processes
# can share the same data volume safely (SQLite WAL mode).

services:
  telegram-downloader:
    build: .
    image: telegram-media-downloader
    container_name: telegram-downloader
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - TGDL_DEBUG=${TGDL_DEBUG:-}
      # Override to run the watchdog process (history / monitor) instead.
      # - TGDL_RUN=monitor
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# First-time setup:
#   docker compose up -d
#   open http://localhost:3000 — set the dashboard password (only allowed
#   from localhost on first run), then go to Settings → Telegram Accounts
#   → Add account.
#
# Headless / no browser:
#   docker compose run --rm telegram-downloader node src/index.js
