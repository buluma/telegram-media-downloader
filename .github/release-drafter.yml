name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feat', 'feature', 'enhancement']
  - title: '🐛 Fixes'
    labels: ['fix', 'bug']
  - title: '🔒 Security'
    labels: ['security']
  - title: '📚 Docs'
    labels: ['docs', 'documentation']
  - title: '🧪 Tests'
    labels: ['test', 'tests']
  - title: '🛠 Maintenance'
    labels: ['chore', 'ci', 'build', 'deps', 'refactor', 'perf']

# Map Conventional-Commits prefixes (feat: / fix: / chore: ...) to the
# above labels automatically.
autolabeler:
  - label: 'feat'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'security'
    title:
      - '/sec(urity)?(\(.+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'test'
    title:
      - '/^tests?(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
  - label: 'ci'
    title:
      - '/^ci(\(.+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'perf'
    title:
      - '/^perf(\(.+\))?:/i'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['feat', 'feature', 'enhancement', 'minor']
  patch:
    labels: ['fix', 'bug', 'security', 'docs', 'chore', 'ci', 'test', 'refactor', 'perf']
  default: patch

template: |
  ## What's changed

  $CHANGES

  **Full Changelog:** https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
