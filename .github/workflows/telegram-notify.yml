name: Notify Telegram

# Posts a message to the configured Telegram chat on:
#   - every push to main (commit summary)
#   - every published release (release notes, with a pre-release badge)
#
# Required repo secrets:
#   TELEGRAM_BOT_TOKEN  — bot token from @BotFather
#   TELEGRAM_CHAT_ID    — target chat id (-100... for channels)

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send commit notification
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO:     ${{ github.repository }}
          BRANCH:   ${{ github.ref_name }}
          ACTOR:    ${{ github.actor }}
          SHA:      ${{ github.sha }}
          MSG:      ${{ github.event.head_commit.message }}
        run: |
          set -e
          [ -z "$TG_TOKEN" ] && { echo "TELEGRAM_BOT_TOKEN not set — skipping"; exit 0; }
          summary=$(printf '%s' "$MSG" | head -n1)
          summary_html=$(printf '%s' "$summary" | python3 -c 'import html,sys; print(html.escape(sys.stdin.read()))')
          text=$(printf '🚀 <b>Update</b>\n\n<b>Repo:</b> %s\n<b>Branch:</b> %s\n<b>By:</b> %s\n<b>Commit:</b> %s\n\n<a href="https://github.com/%s/commit/%s">View commit</a>' \
                  "$REPO" "$BRANCH" "$ACTOR" "$summary_html" "$REPO" "$SHA")
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${text}"

  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Send release notification
        env:
          TG_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:   ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO:      ${{ github.repository }}
          ACTOR:     ${{ github.actor }}
          REL_TAG:   ${{ github.event.release.tag_name }}
          REL_NAME:  ${{ github.event.release.name }}
          REL_URL:   ${{ github.event.release.html_url }}
          REL_BODY:  ${{ github.event.release.body }}
          REL_PRE:   ${{ github.event.release.prerelease }}
        run: |
          set -e
          [ -z "$TG_TOKEN" ] && { echo "TELEGRAM_BOT_TOKEN not set — skipping"; exit 0; }
          if [ "$REL_PRE" = "true" ]; then badge="🧪 Pre-release"; else badge="🎉 New release"; fi
          title="${REL_NAME:-$REL_TAG}"
          title_html=$(printf '%s' "$title" | python3 -c 'import html,sys; print(html.escape(sys.stdin.read()))')
          # Render Markdown into the tiny HTML subset Telegram parses
          # (<b>, <i>, <code>, <pre>, <a>, plus bullet replacement for "- ").
          # Without this the body shipped as literal "**bold**" / "### header"
          # / "`code`" because parse_mode=HTML doesn't understand Markdown.
          # NB: REL_BODY is passed via env, NOT a pipe — a heredoc on python3's
          # stdin would override any piped input from `head`.
          body_html=$(python3 - <<'PYEOF'
          import html, re, sys, os
          md = os.environ.get("REL_BODY", "")[:3500]

          # 1. Extract fenced code blocks first so Markdown inside them is preserved.
          fenced = []
          def stash_fenced(m):
              fenced.append(m.group(1))
              return f"\x00FENCED{len(fenced)-1}\x00"
          md = re.sub(r"```(?:[\w+-]+)?\n?(.*?)```", stash_fenced, md, flags=re.DOTALL)

          # 2. Extract inline `code` likewise.
          inline = []
          def stash_inline(m):
              inline.append(m.group(1))
              return f"\x00INLINE{len(inline)-1}\x00"
          md = re.sub(r"`([^`\n]+)`", stash_inline, md)

          # 3. HTML-escape the remaining narrative text.
          md = html.escape(md, quote=False)

          # 4. Markdown links → <a>.
          md = re.sub(r"\[([^\]]+)\]\(([^)\s]+)\)", r'<a href="\2">\1</a>', md)

          # 5. Headers (#, ##, ###, …) → <b> on their own line.
          md = re.sub(r"^#{1,6}\s+(.+)$", r"<b>\1</b>", md, flags=re.MULTILINE)

          # 6. Bold **text**.
          md = re.sub(r"\*\*([^*\n]+)\*\*", r"<b>\1</b>", md)

          # 7. Italic _text_ (avoid mid-word like snake_case_id).
          md = re.sub(r"(?<![\w])_([^_\n]+)_(?![\w])", r"<i>\1</i>", md)

          # 8. List bullets — Telegram doesn't render Markdown lists natively.
          md = re.sub(r"^[\-\*]\s+", "• ", md, flags=re.MULTILINE)

          # 9. Horizontal rule → blank line (Telegram has no <hr>).
          md = re.sub(r"^---+\s*$", "", md, flags=re.MULTILINE)

          # 10. Restore inline + fenced placeholders as <code>/<pre>.
          for i, c in enumerate(inline):
              md = md.replace(f"\x00INLINE{i}\x00", f"<code>{html.escape(c, quote=False)}</code>")
          for i, c in enumerate(fenced):
              md = md.replace(f"\x00FENCED{i}\x00", f"<pre>{html.escape(c, quote=False)}</pre>")

          # Collapse 3+ consecutive blank lines so removed --- rules don't
          # leave a giant gap.
          md = re.sub(r"\n{3,}", "\n\n", md)

          sys.stdout.write(md)
          PYEOF
          )
          text=$(printf '%s: <b>%s</b>\n\n<b>Repo:</b> %s\n<b>Tag:</b> %s\n<b>By:</b> %s\n\n%s\n\n<a href="%s">View release</a>' \
                  "$badge" "$title_html" "$REPO" "$REL_TAG" "$ACTOR" "$body_html" "$REL_URL")
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${text}"
