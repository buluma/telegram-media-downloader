name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake the commit SHA + build timestamp into the image so the
          # in-page status-bar chip reflects exactly what's deployed.
          # Auto-bumps on every CI push — no manual version bookkeeping.
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILT_AT=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Prove the image actually runs — `docker build` only verifies the
      # Dockerfile parses, not that `node src/web/server.js` can read its
      # own source. We hit a permissions bug (mode 0 on /app/src/*) that
      # only surfaced at runtime, so we now boot the container and ping
      # the healthcheck before considering the build successful.
      - name: Smoke test
        shell: bash
        run: |
          set -e
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "Smoke-testing $IMAGE"

          # File modes + readability (the chmod -R a+rX guard)
          docker run --rm --entrypoint=sh "$IMAGE" -c '
            set -e
            ls -ld /app/src /app/src/web /app/src/web/server.js /app/scripts/healthcheck.js
            [ -r /app/src/web/server.js ] || { echo "FAIL: server.js not readable by node user"; exit 1; }
            [ -x /app/src/web ]           || { echo "FAIL: /app/src/web not traversable"; exit 1; }
            [ -r /app/scripts/healthcheck.js ] || { echo "FAIL: healthcheck.js not readable"; exit 1; }
            echo "OK: file permissions sane"
          '

          # Boot + healthcheck within 30s
          docker run -d --name smoke -p 3000:3000 "$IMAGE"
          for i in $(seq 1 30); do
            if docker exec smoke node scripts/healthcheck.js >/dev/null 2>&1; then
              echo "OK: healthcheck passed after ${i}s"

              # Entrypoint must drop from root → node. If it didn't, the
              # data volume chown trick won't apply but worse — the app
              # would run as root, defeating the whole non-root posture
              # of the image.
              #
              # We've been chasing flakes here. Two earlier attempts:
              #   1. `ps -o user=,comm=` — went silent on the node child.
              #   2. /proc walk reading $UID + $comm — also silent (the
              #      glob `/proc/[0-9]*` evaluated empty in the wrapped
              #      shell, even though `ps -ef` from the same container
              #      cleanly showed node at PID 7 owned by user `node`).
              #
              # `ps -ef` it is. The earlier failure dump confirmed it
              # surfaces the tini child every time — the trick is just
              # to grep on column 1 (UNAME) for `node` rather than the
              # short COMMAND column. Wrap in a 10× / 1 s retry loop
              # purely for boot timing, not for ps reliability.
              FOUND_NODE=0
              for j in $(seq 1 10); do
                PS_OUT=$(docker exec smoke ps -ef)
                if echo "$PS_OUT" | awk 'NR>1 && $1=="node" && $0 ~ / node / {f=1} END{exit !f}'; then
                  echo "OK: app running as node user after ${j} probe(s)"
                  FOUND_NODE=1
                  break
                fi
                sleep 1
              done
              if [ "$FOUND_NODE" != "1" ]; then
                echo "FAIL: no node process running as node user after 10s of probing"
                echo "--- final ps -ef ---"
                echo "$PS_OUT"
                docker logs smoke
                docker stop smoke >/dev/null
                exit 1
              fi

              docker stop smoke >/dev/null
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: healthcheck never returned 200 within 30s"
          docker logs smoke
          docker stop smoke >/dev/null || true
          exit 1
