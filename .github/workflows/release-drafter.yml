name: Release drafter

# Maintains an always-updated draft of the next release in the GitHub
# Releases tab. Each merged PR is appended to the draft under the right
# Conventional-Commits category. Pushing a `v*` tag promotes the draft.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
